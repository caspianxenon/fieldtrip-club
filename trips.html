<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2ecc71">
    <meta name="description" content="Browse and join field trips across Kenya with FieldTrip Club.">
    <title>Our Trips - Field Trip Club Kenya</title>

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="manifest" href="manifest.json">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">🌍 Field Trip Club Kenya</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="trips.html" class="active">Trips</a></li>
                <li><a href="dashboard.html" id="dashboardLink" style="display: none;">Dashboard</a></li>
                <li><a href="register.html" id="registerLink">Register</a></li>
                <li><a href="login.html" id="loginLink">Login</a></li>
                <li><a href="#" id="logoutLink" onclick="logout()" style="display: none;">Logout</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>All Trips</h1>
            <p>Choose from our exciting field trip options</p>
        </div>
    </section>

    <section class="trips-section">
        <div class="container">
            <div class="filters-section">
                <h2>🔍 Filter & Search Trips</h2>
                <div class="filters-grid">
                    <div class="filter-group">
                        <label for="searchInput">🔎 Search:</label>
                        <input type="text" id="searchInput" placeholder="Search by name, location..." oninput="filterTrips()">
                    </div>
                    <div class="filter-group">
                        <label for="locationFilter">📍 Location:</label>
                        <select id="locationFilter" onchange="filterTrips()">
                            <option value="">All Locations</option>
                            <option value="Mount Kenya">Mount Kenya</option>
                            <option value="Nairobi">Nairobi</option>
                            <option value="Coastal Kenya">Coastal Kenya</option>
                            <option value="Rift Valley">Rift Valley</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="priceFilter">💰 Price Range:</label>
                        <select id="priceFilter" onchange="filterTrips()">
                            <option value="">All Prices</option>
                            <option value="budget">Budget (≤ KES 5000)</option>
                            <option value="moderate">Moderate (KES 5000-10000)</option>
                            <option value="luxury">Luxury (> KES 10000)</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="dateFilter">📅 Date:</label>
                        <select id="dateFilter" onchange="filterTrips()">
                            <option value="">All Dates</option>
                            <option value="2026-03-20">March 20</option>
                            <option value="2026-04-10">April 10</option>
                            <option value="2026-05-15">May 15</option>
                            <option value="2026-06-25">June 25</option>
                        </select>
                    </div>
                </div>
                <div class="admin-controls">
                    <button class="btn btn-secondary" onclick="viewPaymentHistory()">📊 My Payment History</button>
                    <button class="btn btn-secondary" onclick="showAdminDashboard()">👨‍💼 Admin Dashboard</button>
                </div>
            </div>

            <div id="tripsGrid" class="trips-grid">
                <!-- Trips will be generated by JavaScript -->
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Field Trip Club Kenya. All rights reserved.</p>
            <p>Contact us: info@fieldtripclub.ke | Phone: +254-123-456-789</p>
        </div>
    </footer>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <!-- App Scripts -->
    <script src="app.js"></script>
    <script src="script.js"></script>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <script>
        // Load trips on page load
        document.addEventListener('DOMContentLoaded', async function() {
            await updateNavigation();
            await loadTripsPage();
        });
    </script>
</body>
</html>
