<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Field Trip Club Kenya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">🌍 Field Trip Club Kenya</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>Reset Your Password</h1>
            <p>Create a new password for your account</p>
        </div>
    </section>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <h2>🔑 Password Reset</h2>

                <div id="resetForm" style="display: block;">
                    <form id="resetPasswordForm" class="auth-form">
                        <div class="form-group">
                            <label for="reset-password">New Password</label>
                            <input type="password" id="reset-password" required placeholder="Enter new password" minlength="8">
                        </div>

                        <div class="form-group">
                            <label for="reset-confirm">Confirm Password</label>
                            <input type="password" id="reset-confirm" required placeholder="Confirm password" minlength="8">
                        </div>

                        <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
                    </form>

                    <p style="margin-top: 1rem; text-align: center;">
                        <a href="login.html" style="color: #2ecc71; text-decoration: none;">Back to Login</a>
                    </p>
                </div>

                <div id="resetSuccess" style="display: none; text-align: center;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">✓</div>
                    <h3 style="color: #2ecc71;">Password Reset Successful!</h3>
                    <p>Your password has been updated. You can now log in with your new password.</p>
                    <a href="login.html" class="btn btn-primary" style="margin-top: 1rem;">Go to Login</a>
                </div>

                <div id="resetError" style="display: none; text-align: center;">
                    <div style="font-size: 3rem; margin-bottom: 1rem; color: #e74c3c;">✗</div>
                    <h3 style="color: #e74c3c;">Reset Failed</h3>
                    <p id="resetErrorMsg"></p>
                    <a href="login.html" class="btn btn-secondary" style="margin-top: 1rem;">Back to Login</a>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');
        const resetEmail = urlParams.get('email');

        // Validate parameters
        if (!resetToken || !resetEmail) {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('resetError').style.display = 'block';
            document.getElementById('resetErrorMsg').textContent = 'Invalid reset link. Please request a new password reset.';
        }

        // Handle form submission
        document.getElementById('resetPasswordForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('reset-password').value;
            const confirmPassword = document.getElementById('reset-confirm').value;

            if (newPassword !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            if (newPassword.length < 8) {
                alert('Password must be at least 8 characters');
                return;
            }

            try {
                const result = await apiCall('/auth/reset-password', 'POST', {
                    email: resetEmail,
                    token: resetToken,
                    newPassword
                });

                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('resetSuccess').style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } catch (error) {
                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('resetError').style.display = 'block';
                document.getElementById('resetErrorMsg').textContent = error.message;
            }
        });
    </script>
</body>
</html>
