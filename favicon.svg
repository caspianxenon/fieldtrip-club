<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" fill="#2ecc71" rx="40"/>

  <!-- Compass/Map symbol -->
  <g transform="translate(96, 96)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#ffffff" stroke-width="4"/>

    <!-- Cardinal directions -->
    <path d="M 0 -60 L 0 -45" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <path d="M 0 60 L 0 45" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <path d="M -60 0 L -45 0" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <path d="M 60 0 L 45 0" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

    <!-- Center pin -->
    <circle cx="0" cy="0" r="8" fill="#ffffff"/>
    <path d="M 0 0 L 35 35" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
